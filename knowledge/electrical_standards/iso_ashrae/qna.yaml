version: 2
task_description: >
  Answer technical questions about ISO 50001 energy management systems and
  ASHRAE standards (90.1 for building energy efficiency and 55 for thermal comfort)
  related to energy performance, building design, and occupant comfort.
created_by: sivani
domain: electrical_standards
seed_examples:
  - context: >
      ISO 50001 is the international standard for Energy Management Systems (EnMS).
      It provides a framework for organizations to develop an energy policy,
      set energy objectives and targets, and continually improve energy performance
      through the Plan-Do-Check-Act cycle.
    questions_and_answers:
      - question: What is the main purpose of ISO 50001?
        answer: >
          ISO 50001 helps organizations establish, implement, maintain, and
          improve an Energy Management System to increase energy efficiency
          and reduce energy costs and greenhouse gas emissions.
      - question: What cycle does ISO 50001 follow for continual improvement?
        answer: >
          ISO 50001 is based on the Plan-Do-Check-Act (PDCA) cycle.

  - context: >
      A key requirement of ISO 50001 is the identification of Significant Energy Uses (SEUs).
      These are the processes, facilities, or equipment that consume the most energy
      and offer the greatest potential for energy performance improvement.
    questions_and_answers:
      - question: What are Significant Energy Uses (SEUs) in ISO 50001?
        answer: >
          SEUs are the energy uses that represent a significant portion of total
          energy consumption and have high potential for improvement.
      - question: Why is identifying SEUs important in an Energy Management System?
        answer: >
          Identifying SEUs allows organizations to focus resources on the areas
          where energy savings can have the biggest impact.

  - context: >
      ASHRAE 90.1 is the Energy Standard for Sites and Buildings Except Low-Rise
      Residential Buildings. It sets minimum energy efficiency requirements for
      building envelope, HVAC systems, lighting, power, and service water heating.
    questions_and_answers:
      - question: What does ASHRAE 90.1 primarily establish?
        answer: >
          ASHRAE 90.1 establishes minimum energy efficiency requirements for
          the design and construction of commercial and high-rise residential buildings.
      - question: Which building systems does ASHRAE 90.1 cover?
        answer: >
          It covers the building envelope, heating/ventilating/air-conditioning (HVAC),
          lighting, power distribution, and service water heating.

  - context: >
      ASHRAE Standard 55 specifies combinations of indoor thermal environmental
      factors (air temperature, radiant temperature, humidity, air speed) and
      personal factors (metabolic rate, clothing insulation) that produce thermal
      conditions acceptable to a majority of occupants.
    questions_and_answers:
      - question: What is the purpose of ASHRAE Standard 55?
        answer: >
          ASHRAE 55 specifies thermal environmental conditions that are acceptable
          to most occupants in indoor spaces.
      - question: What six main factors does ASHRAE 55 consider for thermal comfort?
        answer: >
          The six factors are: air temperature, radiant temperature, humidity,
          air speed, metabolic rate (activity), and clothing insulation.

  - context: >
      ISO 50001 requires organizations to establish an energy baseline (EnB),
      define Energy Performance Indicators (EnPIs), and implement monitoring,
      measurement, and analysis plans to track energy performance improvements
      over time.
    questions_and_answers:
      - question: What is an Energy Baseline (EnB) in ISO 50001?
        answer: >
          The Energy Baseline is a quantitative reference providing a basis for
          comparison of energy performance over time.
      - question: What role do Energy Performance Indicators (EnPIs) play?
        answer: >
          EnPIs are used to monitor and measure energy performance and help
          demonstrate improvements against the energy baseline.

