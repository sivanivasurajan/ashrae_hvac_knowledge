version: 2
task_description: >
  Answer technical questions about IEC electrical standards including
  EV charging, low-voltage installations, and conductive charging systems.
created_by: your-username
domain: electrical_standards
seed_examples:
  - context: >
      IEC 62196-1 is applicable to EV plugs, EV socket-outlets, vehicle
      connectors, and vehicle inlets for electric vehicles intended for use
      in conductive charging systems which incorporate control means, with a
      rated operating voltage not exceeding 690 V AC 50 Hz to 60 Hz at a
      rated current not exceeding 250 A, and 1500 V DC at a rated current
      not exceeding 800 A.
    questions_and_answers:
      - question: What is the maximum rated voltage for AC conductive charging
          covered under IEC 62196-1?
        answer: >
          The maximum rated voltage for AC conductive charging under IEC 62196-1
          is 690 V AC at 50 Hz to 60 Hz, with a rated current not exceeding 250 A.
      - question: What is the maximum DC voltage and current covered by IEC 62196-1?
        answer: >
          IEC 62196-1 covers DC systems up to 1500 V DC at a rated current
          not exceeding 800 A.
      - question: Who is permitted to install accessories covered by IEC 62196-1?
        answer: >
          Accessories covered by IEC 62196-1 are intended to be installed
          by instructed persons or skilled persons only.

  - context: >
      The IEC 62196 series covers the mechanical, electrical and performance
      requirements for plugs, socket-outlets, vehicle connectors and vehicle
      inlets for the connection between the EV supply equipment and the
      electric vehicle. The series consists of multiple parts including
      IEC 62196-1 for general requirements, IEC 62196-2 for dimensional
      compatibility for AC accessories, and IEC 62196-3 for DC and AC/DC
      vehicle couplers.
    questions_and_answers:
      - question: What does the IEC 62196 series cover?
        answer: >
          The IEC 62196 series covers the mechanical, electrical and performance
          requirements for plugs, socket-outlets, vehicle connectors and vehicle
          inlets used for conductive charging of electric vehicles.
      - question: What does IEC 62196-2 specifically address?
        answer: >
          IEC 62196-2 addresses dimensional compatibility and interchangeability
          requirements for AC pin and contact-tube accessories.
      - question: What is the scope of IEC 62196-3?
        answer: >
          IEC 62196-3 covers dimensional compatibility and interchangeability
          requirements for DC and AC/DC pin and contact-tube vehicle couplers.

  - context: >
      IEC 60364-1 is the International Standard for low-voltage electrical
      installations. It covers fundamental principles, assessment of general
      characteristics, and definitions for electrical installations with
      low voltage. Edition 6.0 was published in 2025-09.
    questions_and_answers:
      - question: What does IEC 60364-1 cover?
        answer: >
          IEC 60364-1 covers fundamental principles, assessment of general
          characteristics, and definitions for low-voltage electrical
          installations.
      - question: What is the latest edition of IEC 60364-1?
        answer: >
          The latest edition of IEC 60364-1 is Edition 6.0, published
          in September 2025.
      - question: What type of installations does IEC 60364-1 apply to?
        answer: >
          IEC 60364-1 applies to low-voltage electrical installations,
          covering their fundamental principles and general characteristics.

  - context: >
      Accessories covered by IEC 62196-1 are intended to be used at an
      ambient temperature between -30 degrees Celsius and +40 degrees Celsius.
      The manufacturer can enlarge the temperature range on the condition
      that the specified range information is provided. These accessories
      are intended to be connected only to cables with copper or
      copper-alloy conductors.
    questions_and_answers:
      - question: What is the standard ambient temperature range for IEC 62196-1
          accessories?
        answer: >
          The standard ambient temperature range for IEC 62196-1 accessories
          is between -30 degrees Celsius and +40 degrees Celsius.
      - question: Can the temperature range of IEC 62196-1 accessories be extended?
        answer: >
          Yes, manufacturers can enlarge the temperature range provided
          that the specified range information is clearly provided.
      - question: What type of conductors must IEC 62196-1 accessories connect to?
        answer: >
          IEC 62196-1 accessories are intended to be connected only to
          cables with copper or copper-alloy conductors.

  - context: >
      The IEC 61851 series specifies requirements for electric vehicle
      conductive charging systems. Some charging can be achieved by direct
      connection from an electric vehicle to standard socket-outlets connected
      to a supply network. Some modes of charging require a dedicated supply
      and charging equipment incorporating control and communication circuits.
    questions_and_answers:
      - question: What does the IEC 61851 series specify?
        answer: >
          The IEC 61851 series specifies requirements for electric vehicle
          conductive charging systems.
      - question: Can an electric vehicle charge directly from a standard socket-outlet?
        answer: >
          Yes, some charging modes allow direct connection from an electric
          vehicle to standard socket-outlets connected to a supply network.
      - question: When is dedicated charging equipment required for EV charging?
        answer: >
          Dedicated supply and charging equipment incorporating control and
          communication circuits is required for certain modes of EV charging
          that cannot use standard socket-outlets.